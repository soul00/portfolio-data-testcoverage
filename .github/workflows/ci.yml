name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: gate
          POSTGRES_PASSWORD: gate
          POSTGRES_DB: gate
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gate"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 15
    env:
      DATABASE_URL: postgresql+psycopg://gate:gate@localhost:5432/gate
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install
        run: pip install -e .[dev]
      - name: Lint
        run: ruff check .
      - name: Format check
        run: ruff format --check .
      - name: Unit tests
        run: pytest -q
